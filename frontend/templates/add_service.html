{% extends "base.html" %}

{% block title %}Добавить услугу{% endblock %}

{% block content %}
<div class="card shadow-sm">
    <div class="card-header bg-success text-white">
        <h4 class="mb-0">➕ Новая услуга</h4>
    </div>
    <div class="card-body">
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Название услуги *</label>
                <input type="text" name="name" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Единица измерения *</label>
                <select name="unit" class="form-select" required>
                    <option value="м²">м²</option>
                    <option value="м³">м³</option>
                    <option value="шт">шт</option>
                    <option value="м.п">м.п</option>
                    <option value="ед">ед</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Цена работы (руб) *</label>
                <input type="number" step="0.01" name="work_price" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Цена материалов (руб)</label>
                <input type="number" step="0.01" name="material_price" class="form-control" value="0">
                <small class="text-muted">Оставьте 0, если клиент покупает материалы сам</small>
            </div>
            <button type="submit" class="btn btn-success">💾 Сохранить</button>
            <a href="/services" class="btn btn-secondary">Отмена</a>
        </form>
    </div>
</div>
{% endblock %}
