{% extends "base.html" %}

{% block title %}Добавить услугу{% endblock %}

{% block content %}
<div class="card shadow-sm">
    <div class="card-header bg-success text-white">
        <h4 class="mb-0">➕ Новая услуга</h4>
    </div>
    <div class="card-body">
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Название услуги</label>
                <input type="text" name="name" class="form-control" placeholder="Например: Укладка плитки" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Единица измерения</label>
                <select name="unit" class="form-select" required>
                    <option value="м²">м² (квадратный метр)</option>
                    <option value="м³">м³ (метр кубический)</option>
                    <option value="шт">шт (штука)</option>
                    <option value="м.п">м.п (погонный метр)</option>
                    <option value="ед">ед (единица)</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Цена (руб)</label>
                <input type="number" step="0.01" name="price" class="form-control" required>
                <small class="text-muted">Для услуг «под ключ» указывайте полную стоимость (работа + материалы)</small>
            </div>
            <button type="submit" class="btn btn-success">💾 Сохранить</button>
            <a href="/services" class="btn btn-secondary">Отмена</a>
        </form>
    </div>
</div>
{% endblock %}
