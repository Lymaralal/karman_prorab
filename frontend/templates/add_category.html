{% extends "base.html" %}

{% block title %}Добавить категорию{% endblock %}

{% block content %}
<div class="card shadow-sm">
    <div class="card-header bg-success text-white">
        <h4 class="mb-0">➕ Новая категория</h4>
    </div>
    <div class="card-body">
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Название категории</label>
                <input type="text" name="name" class="form-control" placeholder="Например: Ремонт квартир" required>
            </div>
            <button type="submit" class="btn btn-success">💾 Сохранить</button>
            <a href="/categories" class="btn btn-secondary">Отмена</a>
        </form>
    </div>
</div>
{% endblock %}
