{% extends "base.html" %}

{% block title %}Добавить проект{% endblock %}

{% block content %}
<div class="card shadow-sm">
    <div class="card-header bg-primary text-white">
        <h4 class="mb-0">➕ Новый объект</h4>
    </div>
    <div class="card-body">
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Название объекта</label>
                <input type="text" name="name" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Адрес</label>
                <input type="text" name="address" class="form-control">
            </div>
            <div class="mb-3">
                <label class="form-label">ФИО заказчика</label>
                <input type="text" name="client_name" class="form-control">
            </div>
            <div class="mb-3">
                <label class="form-label">Телефон заказчика</label>
                <input type="text" name="client_phone" class="form-control">
            </div>
            <div class="mb-3">
                <label class="form-label">Статус</label>
                <select name="status" class="form-select">
                    <option value="На этапе согласования">На этапе согласования</option>
                    <option value="В работе" selected>В работе</option>
                    <option value="Завершённые">Завершённые</option>
                    <option value="Отложенные">Отложенные</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Режим сметы</label>
                <select name="estimate_mode" class="form-select">
                    <option value="client_no_materials">Для клиента (без материалов)</option>
                    <option value="client_with_materials">Для клиента (под ключ)</option>
                    <option value="internal">Для себя (внутренняя)</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary">💾 Сохранить</button>
            <a href="/projects" class="btn btn-secondary">Отмена</a>
        </form>
    </div>
</div>
{% endblock %}
