{% extends "base.html" %}

{% block title %}Редактировать продукт{% endblock %}

{% block content %}
<div class="card shadow-sm">
    <div class="card-header bg-primary text-white">
        <h4 class="mb-0">✏️ Редактировать продукт</h4>
    </div>
    <div class="card-body">
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Категория</label>
                <select name="category_id" class="form-select" required>
                    {% for category in categories %}
                    <option value="{{ category.id }}" {% if category.id == product.category_id %}selected{% endif %}>{{ category.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Название продукта</label>
                <input type="text" name="name" value="{{ product.name }}" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Единица измерения</label>
                <select name="unit" class="form-select" required>
                    <option value="м²" {% if product.unit == 'м²' %}selected{% endif %}>м² (квадратный метр)</option>
                    <option value="м³" {% if product.unit == 'м³' %}selected{% endif %}>м³ (метр кубический)</option>
                    <option value="шт" {% if product.unit == 'шт' %}selected{% endif %}>шт (штука)</option>
                    <option value="м.п" {% if product.unit == 'м.п' %}selected{% endif %}>м.п (погонный метр)</option>
                    <option value="ед" {% if product.unit == 'ед' %}selected{% endif %}>ед (единица)</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Цена (руб)</label>
                <input type="number" step="0.01" name="price" value="{{ product.price }}" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Описание</label>
                <textarea name="description" class="form-control" rows="2">{{ product.description or '' }}</textarea>
            </div>
            <button type="submit" class="btn btn-primary">💾 Сохранить</button>
            <a href="/products" class="btn btn-secondary">Отмена</a>
        </form>
    </div>
</div>
{% endblock %}
