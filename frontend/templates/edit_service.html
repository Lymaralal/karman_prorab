{% extends "base.html" %}

{% block title %}Редактировать услугу{% endblock %}

{% block content %}
<div class="card shadow-sm">
    <div class="card-header bg-primary text-white">
        <h4 class="mb-0">✏️ Редактирование услуги</h4>
    </div>
    <div class="card-body">
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Название услуги</label>
                <input type="text" name="name" value="{{ service.name }}" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Единица измерения</label>
                <select name="unit" class="form-select" required>
                    <option value="м²" {% if service.unit == 'м²' %}selected{% endif %}>м²</option>
                    <option value="м³" {% if service.unit == 'м³' %}selected{% endif %}>м³</option>
                    <option value="шт" {% if service.unit == 'шт' %}selected{% endif %}>шт</option>
                    <option value="м.п" {% if service.unit == 'м.п' %}selected{% endif %}>м.п</option>
                    <option value="ед" {% if service.unit == 'ед' %}selected{% endif %}>ед</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Цена работы (руб)</label>
                <input type="number" step="0.01" name="work_price" value="{{ service.work_price }}" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Цена материалов (руб)</label>
                <input type="number" step="0.01" name="material_price" value="{{ service.material_price }}" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary">💾 Сохранить</button>
            <a href="/services" class="btn btn-secondary">Отмена</a>
        </form>
    </div>
</div>
{% endblock %}
